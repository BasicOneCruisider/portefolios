name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ] # ou "main" selon votre branche par défaut
  workflow_dispatch: # Pour lancer manuellement

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.8'

      - name: Run HTML Linting
        run: |
          npm install -g htmlhint
          htmlhint --format compact ./*.html
        continue-on-error: true

      - name: Archive project files (optionnel)
        run: zip -r ${{ github.run_id }}.zip .
        # On garde l'archive mais on ne la publie pas forcément, ou on la publie en artifact.

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Déploie tout le contenu du dépôt

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
